<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - SDE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Load noble curves for EC crypto -->
  <script src="https://cdn.jsdelivr.net/npm/@noble/curves@1.8.1/secp256k1.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="bg-white p-8 rounded shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6">Register</h2>
    <form id="register-form">
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Email</label>
        <input type="email" id="email" class="w-full border p-2 rounded" required>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Username</label>
        <input type="text" id="username" class="w-full border p-2 rounded" required>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium mb-1">Password</label>
        <input type="password" id="password" class="w-full border p-2 rounded" required minlength="8">
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded" id="submit-btn">Register</button>
      <div id="status" class="mt-2 text-sm text-gray-600"></div>
    </form>
  </div>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
