<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - SDE</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="bg-white p-8 rounded shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6">Login</h2>
    <form id="login-form">
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Username</label>
        <input type="text" id="username" class="w-full border p-2 rounded" required>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium mb-1">Password</label>
        <input type="password" id="password" class="w-full border p-2 rounded" required>
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded" id="submit-btn">Login</button>
    </form>
    <p class="mt-4 text-sm text-center">No account? <a href="register.html" class="text-blue-600">Register</a></p>
  </div>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
